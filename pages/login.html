<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/login.css">
    <title>Document</title>
</head>
<body>

    <main>
        <form action="#" class="form-login">
            <div>
                <h1>LOGIN</h1>
            </div>
            <div class="usuario input-set">
                <label for="usuario">Digite seu usuario</label>
                <input class="input-login" type="text" name="usuario" id="usuario">
            </div>
            
            <div class="senha input-set">
                <label for="senha">Senha</label>
                <input class="input-login" type="text" name="senha" id="senha">
            </div>
    
            <button type="button" class="button-login" onclick="login()">Entrar</button>
            <span>Não tem login? Então <a href="./cadastro.html">cadastra-se</a></span>
        </form>
    </main>
    
    
    <script src="../script/login.js"></script>
</body>
</html>
