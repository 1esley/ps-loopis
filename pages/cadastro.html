<!DOCTYPE html>

    <link rel="stylesheet" href="../style/login.css">

</head>
<body>

    <main>
        <form action="./login.html" class="form-login">
            <div>
                <h1>CADASTRO</h1>
            </div>
            <div class="usuario input-set">
                <label for="usuario">Digite seu usuario</label>
                <input class="input-login" type="text" name="usuario" id="usuario_cadastro">
            </div>

                <label for="senha">Senha</label>
                <input class="input-login" type="text" name="senha" id="senha_cadastro">
            </div>
    
            <button class="button-login" onclick="cadastro()">cadastrar-se</button>
            <span>Ja tem conta? Então <a href="./login.html">entre</a></span>
        </form>
    </main>


    <script src="../script/login.js"></script>
