<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../style/style.css">
    <title>Cadastro - VitalCorp</title>
</head>
<body class="login">

    <div class="form-login">
        <div class="shape1"></div>
        <div class="shape2"></div>

            <form id="cadastroForm" class="form-content">
                <a href="./index.html" class="navbar-logo"><img src="../assets/logo.png" alt="Logo VitalCorp"></a>
                <div class="form-div form-div-one">
                    <div class="form-icon">
                        <i class="bx ri-hashtag"></i>
                    </div>

                    <div class="form-div-input">
                        <label for="" class="form-label"></label>
                        <input type="text" class="form-input" placeholder="Matrícula" id="matricula_cadastro">
                    </div>

                </div>
                
                <div class="form-div">
                    <div class="form-icon">
                        <i class="bx ri-account-circle-line"></i>
                    </div>
    
                    <div class="form-div-input">
                        <label for="" class="form-label"></label>
                        <input type="text" class="form-input" placeholder="Usuário" id="usuario_cadastro">
                    </div>
                    
                </div>

                <div class="form-div">
                    <div class="form-icon">
                        <i class="bx ri-lock-line"></i>
                    </div>

                    <div class="form-div-input">
                        <label for="" class="form-label"></label>
                        <input type="password" class="form-input" placeholder="Senha" id="senha_cadastro">
                    </div>
                </div>

                <button type="button" class="form-button" onclick="cadastro()">Cadastrar</button>
                
                <span id="message"></span>
            </form> 
        </div>

    </div>
    <script src="../script/login.js"></script>
</body>
</html>
